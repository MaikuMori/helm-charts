apiVersion: v1
entries:
  gotenberg:
  - annotations:
      artifacthub.io/changes: |
        - kind: changed
          description: Bump Gotenberg version 8.31.0 to 8.32.0
        - kind: changed
          description: "Breaking upstream change: 8.31.0's strict SSRF defaults are reverted; outbound URL filtering now defaults to permissive again. Opt into IP-class filtering via the new deny-private-ips / deny-public-ips flags per module."
        - kind: changed
          description: "Breaking upstream change: file:// rejected at /forms/chromium/convert/url and crafted file:// sub-resources are scoped to the request working directory"
        - kind: changed
          description: "Breaking upstream change: image / pdf stamp and watermark sources require an uploaded file (return HTTP 400 otherwise)"
        - kind: added
          description: Add api.downloadFromDenyPrivateIps and api.downloadFromDenyPublicIps for IP-class filtering on the download-from feature
        - kind: added
          description: Add chromium.denyPrivateIps and chromium.denyPublicIps for IP-class filtering on Chromium navigations and sub-resources (skipped when proxyServer or hostResolverRules is set)
        - kind: added
          description: Add libreOffice.allowList, libreOffice.denyList, libreOffice.denyPrivateIps, libreOffice.denyPublicIps to filter LibreOffice outbound fetches for embedded external content
        - kind: added
          description: Add webhook.denyPrivateIps and webhook.denyPublicIps for IP-class filtering on webhook URLs
        - kind: fixed
          description: "Upstream: Chromium chart-rendering regression (charts printed as blank rectangles in print mode) fixed by pinning chromedp to v0.14.2"
        - kind: fixed
          description: "Upstream: LibreOffice no longer caches an unrecoverable first-start error; lazy-start path retries on failure"
      artifacthub.io/links: |
        - name: Projects Homepage
          url: https://gotenberg.dev/
        - name: Projects GitHub
          url: https://github.com/gotenberg/gotenberg
        - name: Chart's GitHub
          url: https://github.com/MaikuMori/helm-charts/tree/master/charts/gotenberg
        - name: Chart's Changelog
          url: https://github.com/MaikuMori/helm-charts/blob/master/charts/gotenberg/CHANGELOG.md
