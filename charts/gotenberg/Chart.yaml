apiVersion: v2
name: gotenberg
icon: https://user-images.githubusercontent.com/8983173/130322857-185831e2-f041-46eb-a17f-0a69d066c4e5.png
description: A Helm chart for Gotenberg

type: application
version: "1.20.0"
appVersion: "8.32.0"

keywords:
  - gotenberg
  - pdf

sources:
  - https://github.com/gotenberg/gotenberg
  - https://github.com/MaikuMori/helm-charts/tree/master/charts/gotenberg

maintainers:
  - name: MaikuMori
    email: mikskalnins@maikumori.com
    url: maikumori.com

annotations:
  # This annotation allows including named links, which will be rendered nicely in Artifact Hub.
  # You can use this annotation to include links not included previously in the Chart.yaml file,
  # or you can use it to name links already present (in the sources section, for example).
  artifacthub.io/links: |
    - name: Projects Homepage
      url: https://gotenberg.dev/
    - name: Projects GitHub
      url: https://github.com/gotenberg/gotenberg
    - name: Chart's GitHub
      url: https://github.com/MaikuMori/helm-charts/tree/master/charts/gotenberg
    - name: Chart's Changelog
      url: https://github.com/MaikuMori/helm-charts/blob/master/charts/gotenberg/CHANGELOG.md
  artifacthub.io/changes: |
    - kind: changed
      description: Bump Gotenberg version 8.29.1 to 8.31.0
    - kind: changed
      description: "Breaking upstream change: SSRF hardening rejects outbound URLs resolving to loopback, RFC1918, link-local, and other non-public addresses"
    - kind: changed
      description: "Breaking upstream change: --webhook-deny-list now defaults to a regex blocking loopback, RFC1918, link-local, and IPv6 unique-local ranges"
    - kind: changed
      description: "Breaking upstream change: ExifTool metadata write strips control characters and drops System:-prefixed tags"
    - kind: deprecated
      description: webhook.errorAllowList is deprecated upstream (--webhook-error-allow-list), use webhook.allowList instead which now also covers error webhooks
    - kind: deprecated
      description: webhook.errorDenyList is deprecated upstream (--webhook-error-deny-list), use webhook.denyList instead which now also covers error webhooks
    - kind: changed
      description: thecodingmachine/gotenberg images are no longer published upstream, pull from gotenberg/gotenberg instead
