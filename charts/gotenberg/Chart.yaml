apiVersion: v2
name: gotenberg
icon: https://user-images.githubusercontent.com/8983173/130322857-185831e2-f041-46eb-a17f-0a69d066c4e5.png
description: A Helm chart for Gotenberg

type: application
version: "1.19.0"
appVersion: "8.29.0"

keywords:
  - gotenberg
  - pdf

sources:
  - https://github.com/gotenberg/gotenberg
  - https://github.com/MaikuMori/helm-charts/tree/master/charts/gotenberg

maintainers:
  - name: MaikuMori
    email: mikskalnins@maikumori.com
    url: maikumori.com

annotations:
  # This annotation allows including named links, which will be rendered nicely in Artifact Hub.
  # You can use this annotation to include links not included previously in the Chart.yaml file,
  # or you can use it to name links already present (in the sources section, for example).
  artifacthub.io/links: |
    - name: Projects Homepage
      url: https://gotenberg.dev/
    - name: Projects GitHub
      url: https://github.com/gotenberg/gotenberg
    - name: Chart's GitHub
      url: https://github.com/MaikuMori/helm-charts/tree/master/charts/gotenberg
    - name: Chart's Changelog
      url: https://github.com/MaikuMori/helm-charts/blob/master/charts/gotenberg/CHANGELOG.md
  artifacthub.io/changes: |
    - kind: changed
      description: Bump Gotenberg version 8.27.0 to 8.29.0
    - kind: added
      description: Add chromium and LibreOffice idle shutdown timeout flags
    - kind: added
      description: Add API telemetry control flags (root, debug, version route)
    - kind: changed
      description: Rename api.traceHeader to api.correlationIdHeader (old key still works)
    - kind: changed
      description: Rename api.disableHealthCheckLogging to api.disableHealthCheckRouteTelemetry (old key still works)
    - kind: changed
      description: Rename logging.format to logging.stdFormat and logging.enableGcpFields to logging.stdEnableGcpFields (old keys still work)
    - kind: changed
      description: Rename prometheus.disableRouterLogging to prometheus.disableRouteTelemetry (old key still works)
    - kind: changed
      description: "Breaking upstream change: health check route telemetry now disabled by default"
    - kind: added
      description: Document OpenTelemetry support via standard OTEL_* environment variables
